plugins {
    // Downgrading to 1.7.5 which is very stable for 1.21.x
    id 'fabric-loom' version '1.7.5'
    id 'maven-publish'
}

version = "1.0.0"
group = "com.astreal"

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.18.6"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21"
}

// This is the magic "Fix" block
loom {
    // This tells Loom NOT to try and unpick the game
    // which stops that UnsupportedOperationException
    silentMojangMappingsLicense()
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
