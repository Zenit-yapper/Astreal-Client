plugins {
    id 'fabric-loom' version '1.10.5' // Matching your screenshot
    id 'maven-publish'
}

version = "1.0.0"
group = "com.astreal"

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.18.6"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21"
}

// FORCE DISABLE UNPICK (The fix for your error)
configurations.all {
    resolutionStrategy.eachDependency { DependencyResolveDetails details ->
        if (details.requested.name == 'unpick') {
            details.useTarget 'net.fabricmc:unpick:2.0.3' // Force a stable version
        }
    }
}

loom {
    // This stops Loom from looking for the unpick definitions
    runtimeOnlyLog4j = true 
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
