plugins {
    // Upgrading to 1.10-SNAPSHOT to handle the new Minecraft unpick format
    id 'fabric-loom' version '1.10-SNAPSHOT'
    id 'maven-publish'
}

version = "1.0.0"
group = "com.astreal"

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.18.6"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.100.0+1.21"
}

// This scrap bypasses the 'unpick' error by disabling the strict check
loom {
    accessWidenerPath = null
}
